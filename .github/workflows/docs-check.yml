name: Docs Check

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/docs-check.yml"
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - ".github/workflows/docs-check.yml"

jobs:
  metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check LOS metadata
        shell: bash
        run: |
          set -euo pipefail

          missing=0
          legacy_required=("Title:" "Version:" "Status:" "Owner:")
          lks_required=("title:" "status:")
          lks_id_fields=("document_id:" "adr_id:" "standard_id:" "release_id:")

          while IFS= read -r file; do
            case "$file" in
              .github/*)
                continue
                ;;
              README.md|CHANGELOG.md|LICENSE|CODE_OF_CONDUCT.md|CONTRIBUTING.md|13_DECISIONS/TEMPLATE_*.md)
                continue
                ;;
            esac

            has_lks_id=0
            for field in "${lks_id_fields[@]}"; do
              if grep -q "^$field" "$file"; then
                has_lks_id=1
              fi
            done

            if [[ "$has_lks_id" == "1" ]]; then
              for field in "${lks_required[@]}"; do
                if ! grep -q "^$field" "$file"; then
                  echo "$file is missing LKS metadata field: $field"
                  missing=1
                fi
              done
              continue
            fi

            for field in "${legacy_required[@]}"; do
              if ! grep -q "$field" "$file"; then
                echo "$file is missing legacy metadata field: $field"
                missing=1
              fi
            done
          done < <(find . -name "*.md" -not -path "./.git/*" -printf "%P\n")

          exit "$missing"
