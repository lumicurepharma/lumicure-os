name: RFC
description: Propose a major LOS change before implementation.
title: "RFC: "
labels:
  - rfc
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What question should this RFC answer?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why does this matter now?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: tradeoffs
    attributes:
      label: Tradeoffs
      description: List pros, cons, and alternatives.
    validations:
      required: true

